services:
  postgres_db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=aflEWzKejykX1jzV
    ports:
      - 5433:5432
    container_name: postgres_db
    networks:
      - my-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  python_app:
    build: ./
    environment:
      - DB_HOST=postgres_db
      - DB_PORT=5432
    depends_on:
      postgres_db:
        condition: service_healthy
    volumes:
      - ./data/users-names.txt:/app/data/users-names.txt
    stdin_open: true
    tty: true
    networks:
      - my-network

networks:
  my-network: